title: Windows Failed Logon
name: win_failed_logon
id: 6532a3f6-fad7-4cda-adb9-37c68d7c7ff9
status: experimental
description: >
    Base detection for a single failed Windows logon (Event ID 4625). On its own this
    is high volume and low value; it exists to be referenced by the correlation rule
    below, which is what actually flags brute-force behavior.
references:
    - https://attack.mitre.org/techniques/T1110/001/
    - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625
author: Nicolas Portilla
date: 2026-06-19
tags:
    - attack.credential-access
    - attack.t1110.001
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
    condition: selection
falsepositives:
    - Users mistyping passwords
    - Stale cached credentials on services or scheduled tasks
level: informational
---
title: Windows Brute Force - Multiple Failed Logons
id: ee1b71a6-6f29-47b3-9bcd-fd87be163bd4
status: experimental
description: >
    Detects a high number of failed logons against the same account on the same host
    within a short window, a strong indicator of password guessing or spraying.
    Threshold is intentionally conservative; tune to your environment's baseline.
references:
    - https://attack.mitre.org/techniques/T1110/001/
author: Nicolas Portilla
date: 2026-06-19
tags:
    - attack.credential-access
    - attack.t1110.001
correlation:
    type: event_count
    rules:
        - win_failed_logon
    group-by:
        - TargetUserName
        - Computer
    timespan: 5m
    condition:
        gte: 10
falsepositives:
    - Service accounts with expired credentials hammering a host
    - Misconfigured applications retrying authentication in a loop
level: high
