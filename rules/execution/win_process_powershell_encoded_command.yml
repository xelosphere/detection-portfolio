title: PowerShell Encoded Command Execution
id: 9c26d0e3-c191-4fb0-b641-8ac7ea0491c9
status: experimental
description: >
    Detects PowerShell launched with an encoded command argument (-EncodedCommand / -enc).
    Attackers use base64-encoded commands to obfuscate intent and evade simple string
    matching. Legitimate use exists, so pair with parent-process and user context when triaging.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1027/
author: Nicolas Portilla
date: 2026-06-19
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense-evasion
    - attack.t1027
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        - Image|endswith: '\powershell.exe'
        - Image|endswith: '\pwsh.exe'
        - OriginalFileName: 'PowerShell.EXE'
    selection_flag:
        CommandLine|contains:
            - ' -enc '
            - ' -encodedcommand '
            - ' -ec '
    condition: selection_img and selection_flag
falsepositives:
    - Legitimate administrative scripts and software deployment tools (e.g. SCCM, RMM agents)
    - Some installers wrap encoded PowerShell; baseline known-good parents
level: medium
