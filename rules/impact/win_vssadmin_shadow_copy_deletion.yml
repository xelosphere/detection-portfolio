title: Volume Shadow Copy Deletion via Vssadmin
id: 4f9c7de4-b2a2-469a-a713-437415182ca2
status: experimental
description: Detects deletion of Windows volume shadow copies using vssadmin, a step ransomware commonly takes to stop victims from restoring encrypted files.
references:
    - https://attack.mitre.org/techniques/T1490/
author: Nicolas Portilla
date: 2026-06-20
tags:
    - attack.impact
    - attack.t1490
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\vssadmin.exe'
        CommandLine|contains|all:
            - 'delete'
            - 'shadows'
    condition: selection
falsepositives:
    - Backup software or administrators legitimately managing shadow copies.
level: high
