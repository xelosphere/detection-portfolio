title: Successful Risky Entra ID Sign-In
id: 1ade363e-854e-4521-9fc9-423279aee3fa
status: experimental
description: >
    Detects a successful Entra ID (Azure AD) sign-in that Microsoft scored as medium or
    high risk at sign-in time. A successful authentication flagged risky is a strong
    signal of valid-account abuse (stolen credentials, token theft, anomalous location).
references:
    - https://attack.mitre.org/techniques/T1078/004/
    - https://learn.microsoft.com/en-us/entra/id-protection/concept-identity-protection-risks
author: Nicolas Portilla
date: 2026-06-19
tags:
    - attack.initial-access
    - attack.defense-evasion
    - attack.t1078.004
logsource:
    product: azure
    service: signinlogs
detection:
    selection:
        ResultType: 0
        RiskLevelDuringSignIn:
            - medium
            - high
    condition: selection
falsepositives:
    - VPN or proxy egress that trips location-based risk for legitimate users
    - Travelling users; tune with named-location and trusted-device context
level: high
